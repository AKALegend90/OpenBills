<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenBills</title>
  <style>
    :root{--bg:#eef2f5;--ink:#142033;--panel:#fff;--line:#d8e2ea;--muted:#607086;--nav:#172033;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--yellow:#b98705;--violet:#7c3aed}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{border:0;border-radius:8px;background:var(--blue);color:#fff;padding:10px 14px;cursor:pointer;min-height:40px}.secondary{background:#dce5ec;color:var(--ink)}.danger{background:var(--red)}.app{min-height:100vh;display:grid;grid-template-columns:240px 1fr}.dark{--bg:#101827;--ink:#edf4fb;--panel:#182438;--line:#2d405a;--muted:#9fb0c7}.dark button.secondary{background:#2563eb;color:#fff;border:1px solid #60a5fa}.dark button.secondary:hover{background:#1d4ed8}.sidebar{background:var(--nav);color:#fff;padding:24px 16px}.brand{font-size:28px;font-weight:800;margin-bottom:28px}.nav{display:grid;gap:8px}.nav button{display:flex;align-items:center;gap:10px;background:transparent;color:#cbd5e1;text-align:left}.nav button.active,.nav button:hover{background:#294059;color:#fff}.main{padding:32px}.head{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:22px}h1{font-size:34px;margin:0}h2{font-size:18px;margin:0 0 14px}.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:18px}.card,.panel,.row,.form,.settings,.about{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px}.card span,.row span,small{display:block;color:var(--muted);margin-top:4px}.card strong{display:block;font-size:30px;margin-top:10px}.income strong{color:var(--blue)}.left strong{color:var(--green)}.bills strong{color:var(--yellow)}.today strong{color:var(--violet)}.cols{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}.summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.summary-grid div{border:1px solid var(--line);border-radius:8px;padding:12px}.summary-grid span{display:block;color:var(--muted);font-size:13px}.summary-grid strong{font-size:22px}.bill-line{border-top:1px solid var(--line);padding:12px 0;display:grid;gap:4px}.bill-line:first-of-type{border-top:0}.overdue span{color:var(--red)}.today-line span{color:var(--violet)}.filters{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:12px;margin-bottom:14px}input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:10px;background:var(--panel);color:var(--ink)}textarea{min-height:84px;resize:vertical}.form,.settings{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:18px}label{display:grid;gap:6px;font-weight:700}.check{display:flex;gap:8px;align-items:center}.check input{width:auto}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:14px;align-items:center}.actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}.calendar-controls{display:flex;gap:8px;flex-wrap:wrap}.calendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}.day{min-height:112px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px;display:grid;align-content:start;gap:6px}.day .item{background:#dbeafe;color:#0f2d5c;border:1px solid #93c5fd;border-radius:6px;padding:6px;font-size:12px;font-weight:800;cursor:pointer}.day .item.paid{background:#bbf7d0;color:#14532d;border-color:#4ade80;text-decoration:line-through}.dark .day .item{background:#38bdf8;color:#082f49;border-color:#7dd3fc;box-shadow:0 0 0 1px rgba(255,255,255,.14) inset}.dark .day .item.paid{background:#22c55e;color:#052e16;border-color:#86efac}.month-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.month-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;text-align:left;color:var(--ink);min-height:94px}.month-card strong{display:block;font-size:20px;margin-bottom:8px}.month-card span{color:var(--muted)}.month-card.active{background:#2563eb;color:#fff;border-color:#60a5fa}.month-card.active span{color:#dbeafe}.about{max-width:700px;line-height:1.7}.empty{color:var(--muted);margin:0}.status{display:inline-flex;border-radius:99px;padding:4px 8px;font-size:12px;font-weight:800;background:#fee2e2;color:#991b1b}.status.paid{background:#dcfce7;color:#166534}.status.today{background:#ede9fe;color:#5b21b6}.toolbar-note{color:var(--muted);margin:0 0 14px}.notice{grid-column:1/-1;margin:0;color:var(--green);font-weight:800}.toast{position:fixed;right:20px;bottom:20px;background:var(--nav);color:#fff;border-radius:8px;padding:12px 14px;display:flex;gap:10px;align-items:center;box-shadow:0 16px 30px rgba(0,0,0,.24);z-index:5}.toast button{background:#fff;color:var(--nav);min-height:32px;padding:6px 10px}.history{display:grid;gap:8px;max-height:260px;overflow:auto}.history div{display:flex;justify-content:space-between;gap:12px;border-top:1px solid var(--line);padding-top:8px}
    @media(max-width:900px){.app{grid-template-columns:1fr}.nav{grid-template-columns:repeat(3,1fr)}.main{padding:20px}.metrics,.cols,.summary-grid,.form,.settings,.filters,.month-grid{grid-template-columns:1fr}.row,.head{align-items:stretch;flex-direction:column}.calendar{grid-template-columns:repeat(2,minmax(0,1fr))}}
    .brand{display:flex;align-items:center;gap:12px}.brand svg{width:44px;height:44px;flex:0 0 auto}.creator{margin-top:28px;color:#cbd5e1;font-size:14px;line-height:1.5}.creator a,.about a{color:#60a5fa;font-weight:800;text-decoration:none}.creator a:hover,.about a:hover{text-decoration:underline}.about-logo{display:flex;align-items:center;gap:14px;margin-bottom:16px}.about-logo svg{width:64px;height:64px;flex:0 0 auto}.about-logo h1{margin:0}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const categories=["Rent","Mortgage","Car Payment","Insurance","Phone","Internet","Utilities","Credit Card","Loan","Food","Subscription","Other"];
    const storageKey="openbills.data.v1";
    const now=()=>new Date().toISOString();
    const seed={bills:[{id:1,name:"Rent",amount:1400,dueDay:1,category:"Rent",repeatsMonthly:true,isPaid:false,notes:"",createdAt:now(),updatedAt:now()},{id:2,name:"Car Payment",amount:520,dueDay:10,category:"Car Payment",repeatsMonthly:true,isPaid:false,notes:"",createdAt:now(),updatedAt:now()},{id:3,name:"Phone Bill",amount:90,dueDay:20,category:"Phone",repeatsMonthly:true,isPaid:true,notes:"",createdAt:now(),updatedAt:now()}],incomes:[{id:1,name:"Paycheck",amount:1300,frequency:"biweekly",createdAt:now(),updatedAt:now()},{id:2,name:"Side Job",amount:300,frequency:"monthly",createdAt:now(),updatedAt:now()}],settings:{currency:"USD",reminderDays:3,darkMode:false},billPayments:[]};
    let data=load();let page="dashboard";let billDraft=emptyBill();let incomeDraft=emptyIncome();let editingBill=null;let editingIncome=null;let query="";let filter="All";let statusFilter="All";let sortBy="dueDay";let monthOffset=0;let showAllMonths=false;let undoState=null;let settingsNotice="";
    normalizeData();resetForNewMonth();
    function load(){try{return {...seed,...JSON.parse(localStorage.getItem(storageKey)||"{}")}}catch{return seed}}
    function save(){localStorage.setItem(storageKey,JSON.stringify(data));render()}
    function desktopMessage(message){try{window.chrome?.webview?.postMessage(JSON.stringify(message))}catch{}}
    function normalizeData(){data.settings={currency:"USD",reminderDays:3,darkMode:false,lastResetMonth:currentMonthKey(),startWithWindows:false,startMinimized:false,notifications:false,notificationCheckedMonth:"",...(data.settings||{})};data.billPayments=data.billPayments||[];data.bills=(data.bills||[]).map(b=>({...b,repeatsMonthly:b.repeatsMonthly!==false,isPaid:!!b.isPaid,notes:b.notes||""}));data.incomes=data.incomes||[]}
    function currentMonthKey(base=new Date()){return `${base.getFullYear()}-${String(base.getMonth()+1).padStart(2,"0")}`}
    function resetForNewMonth(){const key=currentMonthKey();if(data.settings.lastResetMonth!==key){data.bills=data.bills.map(b=>b.repeatsMonthly?{...b,isPaid:false,updatedAt:now()}:b);data.settings.lastResetMonth=key;localStorage.setItem(storageKey,JSON.stringify(data))}}
    function money(v){return new Intl.NumberFormat("en-US",{style:"currency",currency:data.settings.currency||"USD"}).format(Number(v)||0)}
    function monthlyIncome(i){return i.frequency==="weekly"?i.amount*52/12:i.frequency==="biweekly"?i.amount*26/12:i.amount}
    function totalIncome(){return data.incomes.reduce((t,i)=>t+monthlyIncome(i),0)}
    function totalBills(){return data.bills.reduce((t,b)=>t+b.amount,0)}
    function daysUntil(dueDay,base=new Date()){const current=new Date(base.getFullYear(),base.getMonth(),base.getDate());const last=new Date(base.getFullYear(),base.getMonth()+1,0).getDate();const due=new Date(base.getFullYear(),base.getMonth(),Math.min(dueDay,last));return Math.ceil((due-current)/86400000)}
    function dueToday(b){return !b.isPaid&&daysUntil(b.dueDay)===0}
    function dueSoon(b){const d=daysUntil(b.dueDay);return !b.isPaid&&d>0&&d<=data.settings.reminderDays}
    function overdue(b){return !b.isPaid&&daysUntil(b.dueDay)<0}
    function ordinal(n){const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}
    function nextId(items){return Math.max(0,...items.map(i=>i.id))+1}
    function emptyBill(){return{name:"",amount:0,dueDay:1,category:"Other",repeatsMonthly:true,isPaid:false,notes:""}}
    function emptyIncome(){return{name:"",amount:0,frequency:"monthly"}}
    function navButton(key,label,icon){return `<button class="${page===key?"active":""}" onclick="page='${key}';render()"><span>${icon}</span><span>${label}</span></button>`}
    function logoSvg(size=44){return `<svg width="${size}" height="${size}" viewBox="0 0 256 256" aria-hidden="true"><rect width="256" height="256" rx="56" fill="#2563eb"/><path d="M70 54h116c11 0 20 9 20 20v108c0 11-9 20-20 20H70c-11 0-20-9-20-20V74c0-11 9-20 20-20Z" fill="#eff6ff"/><path d="M82 90h92M82 120h72M82 150h48" stroke="#1e3a8a" stroke-width="14" stroke-linecap="round"/><path d="M119 177l24 24 48-58" fill="none" stroke="#16a34a" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/></svg>`}
    function layout(content){document.body.className=data.settings.darkMode?"dark":"";document.getElementById("app").innerHTML=`<div class="app"><aside class="sidebar"><div class="brand">${logoSvg()}<span>OpenBills</span></div><nav class="nav">${navButton("dashboard","Dashboard","▦")}${navButton("bills","Bills","☑")}${navButton("income","Income","$")}${navButton("calendar","Calendar","□")}${navButton("settings","Settings","⚙")}${navButton("about","About","i")}</nav><p class="creator">Created by<br><a href="https://github.com/AKALegend90" target="_blank" rel="noopener noreferrer">AKALegend90</a></p></aside><main class="main">${content}</main></div>`}
    function card(title,value,cls){return `<article class="card ${cls}"><span>${title}</span><strong>${value}</strong></article>`}
    function billLine(b){const d=daysUntil(b.dueDay);return `<div class="bill-line ${d<0?"overdue":d===0?"today-line":""}"><strong>${b.name}</strong><span>${money(b.amount)} - ${d<0?Math.abs(d)+" days overdue":d===0?"Due today":"Due in "+d+" days"}</span></div>`}
    function dashboard(){const unpaid=data.bills.filter(b=>!b.isPaid),paid=data.bills.length-unpaid.length,next=unpaid.filter(b=>daysUntil(b.dueDay)>=0).sort((a,b)=>daysUntil(a.dueDay)-daysUntil(b.dueDay))[0],paidTotal=data.bills.filter(b=>b.isPaid).reduce((t,b)=>t+b.amount,0),unpaidTotal=data.bills.filter(b=>!b.isPaid).reduce((t,b)=>t+b.amount,0),overdueTotal=data.bills.filter(overdue).reduce((t,b)=>t+b.amount,0);layout(`<section><header class="head"><h1>Dashboard</h1><div><button onclick="page='bills';render()">Add Bill</button> <button onclick="page='income';render()">Add Income</button></div></header><div class="metrics">${card("Monthly Income",money(totalIncome()),"income")}${card("Total Bills",money(totalBills()),"bills")}${card("Money Left",money(totalIncome()-totalBills()),"left")}${card("Due Today",String(data.bills.filter(dueToday).length),"today")}${card("Paid / Unpaid",`${paid} / ${unpaid.length}`,"neutral")}</div><div class="cols"><section class="panel"><h2>Next Due</h2>${next?billLine(next):'<p class="empty">No unpaid bills due this month.</p>'}</section><section class="panel"><h2>Due Today</h2>${data.bills.filter(dueToday).map(billLine).join("")||'<p class="empty">Nothing due today.</p>'}</section><section class="panel"><h2>Due Soon</h2>${data.bills.filter(dueSoon).map(billLine).join("")||'<p class="empty">Nothing due soon.</p>'}</section><section class="panel"><h2>Overdue</h2>${data.bills.filter(overdue).map(billLine).join("")||'<p class="empty">No overdue bills.</p>'}</section></div><section class="panel" style="margin-top:16px"><h2>Monthly Summary</h2><div class="summary-grid"><div><span>Paid bills</span><strong>${paid}</strong></div><div><span>Paid amount</span><strong>${money(paidTotal)}</strong></div><div><span>Unpaid amount</span><strong>${money(unpaidTotal)}</strong></div><div><span>Overdue total</span><strong>${money(overdueTotal)}</strong></div><div><span>Payment records</span><strong>${data.billPayments.filter(p=>p.paidMonth===currentMonthKey()).length}</strong></div><div><span>Reset month</span><strong>${data.settings.lastResetMonth}</strong></div></div></section></section>`)}
    function billForm(){return `<div class="form"><label>Bill name<input id="billName" value="${escapeHtml(billDraft.name)}"></label><label>Amount<input id="billAmount" type="number" min="0" step="0.01" value="${billDraft.amount}"></label><label>Due day<input id="billDueDay" type="number" min="1" max="31" value="${billDraft.dueDay}"></label><label>Category<select id="billCategory">${categories.map(c=>`<option ${billDraft.category===c?"selected":""}>${c}</option>`).join("")}</select></label><label>Notes<textarea id="billNotes">${escapeHtml(billDraft.notes||"")}</textarea></label><label class="check"><input id="billRepeats" type="checkbox" ${billDraft.repeatsMonthly?"checked":""}> Repeats monthly</label><button onclick="saveBill()">${editingBill?"Save Changes":"Save Bill"}</button><button class="secondary" onclick="editingBill=null;billDraft=emptyBill();render()">Cancel</button></div>`}
    function bills(){const list=data.bills.filter(b=>b.name.toLowerCase().includes(query.toLowerCase())).filter(b=>filter==="All"||b.category===filter).filter(b=>statusFilter==="All"||statusMatches(b)).sort(sortBills);layout(`<section><header class="head"><h1>Bills</h1><button onclick="editingBill=null;billDraft=emptyBill();render()">Add Bill</button></header><p class="toolbar-note">Bills reset to unpaid automatically when a new month starts. Payment history is kept when you mark a bill paid.</p><div class="filters"><input placeholder="Search bills" value="${escapeHtml(query)}" oninput="query=this.value;render()"><select onchange="filter=this.value;render()"><option>All</option>${categories.map(c=>`<option ${filter===c?"selected":""}>${c}</option>`).join("")}</select><select onchange="statusFilter=this.value;render()">${["All","Unpaid","Paid","Due Today","Due Soon","Overdue"].map(s=>`<option ${statusFilter===s?"selected":""}>${s}</option>`).join("")}</select><select onchange="sortBy=this.value;render()"><option value="dueDay" ${sortBy==="dueDay"?"selected":""}>Sort by due day</option><option value="amount" ${sortBy==="amount"?"selected":""}>Sort by amount</option><option value="name" ${sortBy==="name"?"selected":""}>Sort by name</option><option value="category" ${sortBy==="category"?"selected":""}>Sort by category</option></select></div>${billForm()}<div class="list">${list.map(b=>`<article class="row"><div><strong>${escapeHtml(b.name)} ${billStatus(b)}</strong><span>${money(b.amount)} - Due ${ordinal(b.dueDay)} - ${b.category}</span>${lastPaidText(b.id)}${b.notes?`<small>${escapeHtml(b.notes)}</small>`:""}</div><div class="actions"><button onclick="toggleBill(${b.id})">${b.isPaid?"Mark Unpaid":"Mark Paid"}</button><button onclick="editBill(${b.id})">Edit</button><button class="danger" onclick="deleteBill(${b.id})">Delete</button></div></article>`).join("")||'<p class="empty">No bills match those filters.</p>'}</div>${undoToast()}</section>`)}
    function statusMatches(b){return statusFilter==="Paid"?b.isPaid:statusFilter==="Unpaid"?!b.isPaid:statusFilter==="Due Today"?dueToday(b):statusFilter==="Due Soon"?dueSoon(b):statusFilter==="Overdue"?overdue(b):true}
    function sortBills(a,b){if(sortBy==="amount")return b.amount-a.amount;if(sortBy==="name")return a.name.localeCompare(b.name);if(sortBy==="category")return a.category.localeCompare(b.category)||a.dueDay-b.dueDay;return a.dueDay-b.dueDay}
    function billStatus(b){if(b.isPaid)return '<span class="status paid">Paid</span>';if(dueToday(b))return '<span class="status today">Due today</span>';return `<span class="status">${overdue(b)?"Overdue":"Unpaid"}</span>`}
    function lastPaidText(id){const last=[...data.billPayments].filter(p=>p.billId===id).sort((a,b)=>b.paidAt.localeCompare(a.paidAt))[0];return last?`<small>Last paid ${new Date(last.paidAt).toLocaleDateString()} for ${last.paidMonth}</small>`:""}
    function undoToast(){return undoState?`<div class="toast"><span>${undoState.label}</span><button onclick="undoDelete()">Undo</button></div>`:""}
    function readBillDraft(){billDraft={name:document.getElementById("billName").value.trim(),amount:Number(document.getElementById("billAmount").value),dueDay:Number(document.getElementById("billDueDay").value),category:document.getElementById("billCategory").value,repeatsMonthly:document.getElementById("billRepeats").checked,isPaid:editingBill?editingBill.isPaid:false,notes:document.getElementById("billNotes").value.trim()}}
    function saveBill(){readBillDraft();if(!billDraft.name||billDraft.amount<=0||billDraft.dueDay<1||billDraft.dueDay>31){alert("Bill name, amount greater than 0, and due day 1-31 are required.");return}if(editingBill){data.bills=data.bills.map(b=>b.id===editingBill.id?{...b,...billDraft,updatedAt:now()}:b)}else{data.bills=[...data.bills,{...billDraft,id:nextId(data.bills),createdAt:now(),updatedAt:now()}]}editingBill=null;billDraft=emptyBill();save()}
    function editBill(id){editingBill=data.bills.find(b=>b.id===id);billDraft={name:editingBill.name,amount:editingBill.amount,dueDay:editingBill.dueDay,category:editingBill.category,repeatsMonthly:editingBill.repeatsMonthly,isPaid:editingBill.isPaid,notes:editingBill.notes||""};render()}
    function deleteBill(id){if(confirm("Delete this bill?")){const bill=data.bills.find(b=>b.id===id);undoState={type:"bill",item:bill,label:`Deleted ${bill.name}`};data.bills=data.bills.filter(b=>b.id!==id);save()}}
    function undoDelete(){if(!undoState)return;if(undoState.type==="bill")data.bills=[...data.bills,undoState.item].sort((a,b)=>a.dueDay-b.dueDay);if(undoState.type==="income")data.incomes=[...data.incomes,undoState.item].sort((a,b)=>a.name.localeCompare(b.name));undoState=null;save()}
    function toggleBill(id){const before=data.bills.find(b=>b.id===id);data.bills=data.bills.map(b=>b.id===id?{...b,isPaid:!b.isPaid,updatedAt:now()}:b);const bill=data.bills.find(b=>b.id===id);if(bill&&bill.isPaid&&!before.isPaid){data.billPayments.push({id:nextId(data.billPayments),billId:id,paidMonth:currentMonthKey(),paidAt:now()})}save()}
    function incomeForm(){return `<div class="form"><label>Income name<input id="incomeName" value="${escapeHtml(incomeDraft.name)}"></label><label>Amount<input id="incomeAmount" type="number" min="0" step="0.01" value="${incomeDraft.amount}"></label><label>Frequency<select id="incomeFrequency">${["weekly","biweekly","monthly","custom"].map(f=>`<option value="${f}" ${incomeDraft.frequency===f?"selected":""}>${f[0].toUpperCase()+f.slice(1)}</option>`).join("")}</select></label><button onclick="saveIncome()">${editingIncome?"Save Changes":"Save Income"}</button><button class="secondary" onclick="editingIncome=null;incomeDraft=emptyIncome();render()">Cancel</button></div>`}
    function income(){layout(`<section><header class="head"><h1>Income</h1><strong>Estimated Monthly Income: ${money(totalIncome())}</strong></header>${incomeForm()}<div class="list">${data.incomes.map(i=>`<article class="row"><div><strong>${escapeHtml(i.name)}</strong><span>${money(i.amount)} - ${i.frequency} - Monthly estimate ${money(monthlyIncome(i))}</span></div><div class="actions"><button onclick="editIncome(${i.id})">Edit</button><button class="danger" onclick="deleteIncome(${i.id})">Delete</button></div></article>`).join("")||'<p class="empty">No income sources yet.</p>'}</div>${undoToast()}</section>`)}
    function saveIncome(){incomeDraft={name:document.getElementById("incomeName").value.trim(),amount:Number(document.getElementById("incomeAmount").value),frequency:document.getElementById("incomeFrequency").value};if(!incomeDraft.name||incomeDraft.amount<=0){alert("Income name and amount greater than 0 are required.");return}if(editingIncome){data.incomes=data.incomes.map(i=>i.id===editingIncome.id?{...i,...incomeDraft,updatedAt:now()}:i)}else{data.incomes=[...data.incomes,{...incomeDraft,id:nextId(data.incomes),createdAt:now(),updatedAt:now()}]}editingIncome=null;incomeDraft=emptyIncome();save()}
    function editIncome(id){editingIncome=data.incomes.find(i=>i.id===id);incomeDraft={name:editingIncome.name,amount:editingIncome.amount,frequency:editingIncome.frequency};render()}
    function deleteIncome(id){if(confirm("Delete this income source?")){const income=data.incomes.find(i=>i.id===id);undoState={type:"income",item:income,label:`Deleted ${income.name}`};data.incomes=data.incomes.filter(i=>i.id!==id);save()}}
    function calendar(){const base=new Date();base.setMonth(base.getMonth()+monthOffset);const y=base.getFullYear(),m=base.getMonth(),first=new Date(y,m,1),days=new Date(y,m+1,0).getDate();if(showAllMonths){layout(`<section><header class="head"><h1>${y} Calendar</h1><div class="calendar-controls"><button class="secondary" onclick="showAllMonths=false;render()">Month View</button><button class="secondary" onclick="monthOffset-=12;render()">Previous Year</button><button class="secondary" onclick="monthOffset=0;render()">Current Month</button><button class="secondary" onclick="monthOffset+=12;render()">Next Year</button></div></header><div class="month-grid">${monthPicker(y,m)}</div></section>`);return}let cells="";for(let i=0;i<first.getDay();i++)cells+="<div></div>";for(let d=1;d<=days;d++){cells+=`<div class="day"><strong>${d}</strong>${data.bills.filter(b=>Math.min(b.dueDay,days)===d).map(b=>`<div class="item ${b.isPaid?"paid":""}" onclick="page='bills';editBill(${b.id})">${escapeHtml(b.name)} - ${money(b.amount)}</div>`).join("")}</div>`}layout(`<section><header class="head"><h1>${first.toLocaleString("en-US",{month:"long",year:"numeric"})}</h1><div class="calendar-controls"><button class="secondary" onclick="monthOffset--;render()">Previous</button><button class="secondary" onclick="monthOffset=0;render()">Current</button><button class="secondary" onclick="monthOffset++;render()">Next</button><button onclick="showAllMonths=true;render()">All Months</button></div></header><div class="calendar">${cells}</div></section>`)}
    function monthPicker(year,activeMonth){const nowDate=new Date();return Array.from({length:12}).map((_,month)=>{const billsInMonth=data.bills.filter(b=>b.dueDay<=new Date(year,month+1,0).getDate()).length;const targetOffset=(year-nowDate.getFullYear())*12+(month-nowDate.getMonth());const label=new Date(year,month,1).toLocaleString("en-US",{month:"long"});return `<button class="month-card ${month===activeMonth?"active":""}" onclick="monthOffset=${targetOffset};showAllMonths=false;render()"><strong>${label}</strong><span>${billsInMonth} bill${billsInMonth===1?"":"s"}</span></button>`}).join("")}
    function settings(){layout(`<section><header class="head"><h1>Settings</h1></header><div class="settings"><label>Currency<select onchange="data.settings.currency=this.value;save()"><option value="USD">USD</option></select></label><label>Reminder days<select onchange="data.settings.reminderDays=Number(this.value);save()">${[1,3,5,7].map(n=>`<option value="${n}" ${data.settings.reminderDays===n?"selected":""}>${n} day${n>1?"s":""} before</option>`).join("")}</select></label><label class="check"><input type="checkbox" ${data.settings.darkMode?"checked":""} onchange="data.settings.darkMode=this.checked;save()"> Dark mode</label><label class="check"><input type="checkbox" ${data.settings.startWithWindows?"checked":""} onchange="updateDesktopSetting('startWithWindows',this.checked)"> Start with Windows</label><label class="check"><input type="checkbox" ${data.settings.startMinimized?"checked":""} onchange="updateDesktopSetting('startMinimized',this.checked)"> Start minimized</label><label class="check"><input type="checkbox" ${data.settings.notifications?"checked":""} onchange="updateNotifications(this.checked)"> System notifications</label><button onclick="testNotification()">Test notification</button><button onclick="exportJsonToBox()">Export JSON backup</button><button onclick="exportCsv('bills')">Export bills CSV</button><button onclick="exportCsv('income')">Export income CSV</button><label>JSON backup<textarea id="importText" placeholder="Export creates JSON here, or paste OpenBills backup JSON to import"></textarea></label><button onclick="importData()">Import JSON</button><button onclick="downloadText('openbills-backup.json',document.getElementById('importText').value,'application/json')">Download JSON file</button><label>CSV import/export<textarea id="csvText" placeholder="Export creates CSV here, or paste bills CSV / income CSV to import"></textarea></label><button onclick="importCsv('bills')">Import bills CSV</button><button onclick="importCsv('income')">Import income CSV</button><button onclick="downloadText('openbills-export.csv',document.getElementById('csvText').value,'text/csv')">Download CSV file</button><button class="danger" onclick="resetData()">Reset app data</button><p id="settingsNotice" class="notice">${escapeHtml(settingsNotice)}</p></div><section class="panel"><h2>Payment History</h2><div class="history">${paymentHistoryHtml()}</div></section><section class="about" style="margin-top:16px"><h2>About OpenBills</h2><p>OpenBills is manual input only. No account, bank connection, cloud sync, ads, tracking, or analytics. Windows startup and notifications are optional local desktop settings.</p></section></section>`)}
    function setSettingsNotice(message){settingsNotice=message;const el=document.getElementById("settingsNotice");if(el)el.textContent=message}
    function updateDesktopSetting(key,value){data.settings[key]=value;localStorage.setItem(storageKey,JSON.stringify(data));desktopMessage({type:"settings",startWithWindows:data.settings.startWithWindows,startMinimized:data.settings.startMinimized});setSettingsNotice("Desktop startup settings saved.")}
    async function updateNotifications(value){data.settings.notifications=value;localStorage.setItem(storageKey,JSON.stringify(data));if(value&&"Notification" in window&&Notification.permission==="default"){try{await Notification.requestPermission()}catch{}}desktopMessage({type:"settings",notifications:value});setSettingsNotice(value?"Notifications enabled.":"Notifications disabled.");if(value)notifyDueBills(true);render()}
    function sendSystemNotification(title,body){if(!data.settings.notifications)return;desktopMessage({type:"notify",title,body});if("Notification" in window&&Notification.permission==="granted")new Notification(title,{body})}
    function testNotification(){data.settings.notifications=true;localStorage.setItem(storageKey,JSON.stringify(data));sendSystemNotification("OpenBills notifications are on","You will be reminded about due today and due soon bills when OpenBills opens.");setSettingsNotice("Test notification sent.")}
    function notifyDueBills(force=false){if(!data.settings.notifications)return;const month=currentMonthKey();if(!force&&data.settings.notificationCheckedMonth===month)return;const urgent=data.bills.filter(b=>dueToday(b)||dueSoon(b)||overdue(b));if(!urgent.length)return;data.settings.notificationCheckedMonth=month;localStorage.setItem(storageKey,JSON.stringify(data));const overdueCount=urgent.filter(overdue).length,todayCount=urgent.filter(dueToday).length,soonCount=urgent.filter(dueSoon).length;sendSystemNotification("OpenBills bill reminder",`${overdueCount} overdue, ${todayCount} due today, ${soonCount} due soon.`)}
    function exportJsonToBox(){const text=JSON.stringify({...data,version:1,exportedAt:now()},null,2);putExportText("importText",text,"JSON backup is ready in the box below.")}
    function exportData(){exportJsonToBox()}
    function importData(){try{const imported=JSON.parse(document.getElementById("importText").value);data={...data,bills:imported.bills||[],incomes:imported.incomes||[],settings:imported.settings||data.settings,billPayments:imported.billPayments||[]};settingsNotice="Imported JSON backup.";save()}catch{setSettingsNotice("That backup file could not be imported.")}}
    function csvEscape(value){const text=String(value??"");return /[",\n]/.test(text)?`"${text.replace(/"/g,'""')}"`:text}
    function csvRows(rows){return rows.map(row=>row.map(csvEscape).join(",")).join("\n")}
    function downloadText(filename,text,type="text/csv"){if(!text.trim()){setSettingsNotice("Export something first, then download it.");return}const blob=new Blob([text],{type});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);setSettingsNotice("Download started. If this browser blocks downloads, use the text box contents instead.")}
    async function putExportText(id,text,message){const box=document.getElementById(id);box.value=text;box.focus();box.select();try{await navigator.clipboard.writeText(text);setSettingsNotice(`${message} Copied to clipboard too.`)}catch{setSettingsNotice(message)}}
    function exportCsv(kind){const text=kind==="bills"?csvRows([["name","amount","dueDay","category","repeatsMonthly","isPaid","notes"],...data.bills.map(b=>[b.name,b.amount,b.dueDay,b.category,b.repeatsMonthly,b.isPaid,b.notes||""])]):csvRows([["name","amount","frequency"],...data.incomes.map(i=>[i.name,i.amount,i.frequency])]);putExportText("csvText",text,`${kind==="bills"?"Bills":"Income"} CSV is ready in the box below.`)}
    function parseCsv(text){const rows=[];let row=[],cell="",quoted=false;for(let i=0;i<text.length;i++){const ch=text[i],next=text[i+1];if(ch==='"'&&quoted&&next==='"'){cell+='"';i++}else if(ch==='"'){quoted=!quoted}else if(ch===","&&!quoted){row.push(cell);cell=""}else if((ch==="\n"||ch==="\r")&&!quoted){if(ch==="\r"&&next==="\n")i++;row.push(cell);if(row.some(v=>v.trim()))rows.push(row);row=[];cell=""}else{cell+=ch}}row.push(cell);if(row.some(v=>v.trim()))rows.push(row);return rows}
    function importCsv(kind){try{const rows=parseCsv(document.getElementById("csvText").value.trim());if(rows.length<2){setSettingsNotice("Paste CSV with a header row and at least one data row first.");return}const header=rows.shift().map(h=>h.trim());const records=rows.map(row=>Object.fromEntries(header.map((h,i)=>[h,row[i]||""])));if(kind==="bills"){const startId=nextId(data.bills);const imported=records.map((r,idx)=>({id:startId+idx,name:(r.name||"").trim(),amount:Number(r.amount),dueDay:Number(r.dueDay),category:categories.includes(r.category)?r.category:"Other",repeatsMonthly:String(r.repeatsMonthly).toLowerCase()!=="false",isPaid:String(r.isPaid).toLowerCase()==="true",notes:r.notes||"",createdAt:now(),updatedAt:now()})).filter(b=>b.name&&b.amount>0&&b.dueDay>=1&&b.dueDay<=31);data.bills=[...data.bills,...imported];settingsNotice=`Imported ${imported.length} bill${imported.length===1?"":"s"}.`}else{const startId=nextId(data.incomes);const imported=records.map((r,idx)=>({id:startId+idx,name:(r.name||"").trim(),amount:Number(r.amount),frequency:["weekly","biweekly","monthly","custom"].includes(r.frequency)?r.frequency:"monthly",createdAt:now(),updatedAt:now()})).filter(i=>i.name&&i.amount>0);data.incomes=[...data.incomes,...imported];settingsNotice=`Imported ${imported.length} income source${imported.length===1?"":"s"}.`}save()}catch{setSettingsNotice("That CSV could not be imported.")}}
    function paymentHistoryHtml(){const history=[...data.billPayments].sort((a,b)=>b.paidAt.localeCompare(a.paidAt));if(!history.length)return '<p class="empty">No payment records yet.</p>';return history.map(p=>{const bill=data.bills.find(b=>b.id===p.billId);return `<div><span>${escapeHtml(bill?bill.name:"Deleted bill")} - ${p.paidMonth}</span><strong>${new Date(p.paidAt).toLocaleDateString()}</strong></div>`}).join("")}
    function resetData(){if(confirm("Reset all bills and income?")){data={...seed,bills:[],incomes:[],billPayments:[],settings:data.settings};save()}}
    function about(){layout(`<section class="about"><div class="about-logo">${logoSvg(64)}<h1>OpenBills</h1></div><p>OpenBills is a free, open-source, privacy-first bill tracker.</p><p>No account required.<br>No bank connection.<br>No cloud sync.<br>No ads.<br>All data stays on your device.</p><p>Created by <a href="https://github.com/AKALegend90" target="_blank" rel="noopener noreferrer">AKALegend90</a></p><p>License: MIT</p></section>`)}
    function escapeHtml(value){return String(value).replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]))}
    function render(){({dashboard,bills,income,calendar,settings,about}[page]||dashboard)()}
    render();setTimeout(()=>notifyDueBills(false),800);
  </script>
</body>
</html>
